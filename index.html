<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Email Signature</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n        }\n        .signature {\n            display: flex;\n            width: 600px;\n            background-color: #f2f2f2;\n            border: 1px solid #ccc;\n            border-radius: 8px;\n            overflow: hidden;\n        }\n        .left-sidebar {\n            background-color: #009688;\n            padding: 20px;\n            text-align: center;\n            width: 150px;\n        }\n        .left-sidebar img {\n            border-radius: 50%;\n            width: 100px;\n            height: 100px;\n        }\n        .right-content {\n            padding: 20px;\n            flex-grow: 1;\n        }\n        .contact-icons {\n            display: flex;\n            gap: 10px;\n        }\n        .contact-icons img {\n            width: 24px;\n            height: 24px;\n        }\n    </style>\n</head>\n<body>\n    <div class="signature">\n        <div class="left-sidebar">\n            <img src="your-photo-url.jpg" alt="Profile Photo">\n        </div>\n        <div class="right-content">\n            <h2>Your Name</h2>\n            <p>Your Title</p>\n            <div class="contact-icons">\n                <a href="mailto:your-email@example.com"><img src="email-icon-url.png" alt="Email"></a>\n                <a href="tel:+123456789"><img src="phone-icon-url.png" alt="Phone"></a>\n                <a href="https://linkedin.com/in/your-linkedin"><img src="linkedin-icon-url.png" alt="LinkedIn"></a>\n            </div>\n        </div>\n    </div>\n</body>\n</html>
